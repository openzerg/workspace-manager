services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: e2e-wm-pg
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e_wm
    ports:
      - "15434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e"]
      interval: 2s
      timeout: 2s
      retries: 10
